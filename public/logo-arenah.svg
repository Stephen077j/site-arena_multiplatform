<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Gradient definition -->
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366F1;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="2" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="url(#logoGradient)" filter="url(#shadow)"/>
  
  <!-- Letter A stylized -->
  <g transform="translate(100, 100)">
    <!-- Main A shape -->
    <path d="M -35 40 L 0 -45 L 35 40 L 20 40 L 15 25 L -15 25 L -20 40 Z M -10 10 L 10 10 L 0 -20 Z" 
          fill="white" 
          stroke="white" 
          stroke-width="2"
          stroke-linejoin="round"/>
    
    <!-- Sparkle effect top right -->
    <circle cx="25" cy="-35" r="3" fill="white" opacity="0.8"/>
    <circle cx="35" cy="-25" r="2" fill="white" opacity="0.6"/>
    
    <!-- Sparkle effect bottom left -->
    <circle cx="-30" cy="30" r="2.5" fill="white" opacity="0.7"/>
    <circle cx="-40" cy="20" r="1.5" fill="white" opacity="0.5"/>
  </g>
  
  <!-- Decorative arc -->
  <path d="M 50 100 Q 50 50, 100 50" 
        stroke="white" 
        stroke-width="2" 
        fill="none" 
        opacity="0.3"
        stroke-linecap="round"/>
  
  <path d="M 150 100 Q 150 150, 100 150" 
        stroke="white" 
        stroke-width="2" 
        fill="none" 
        opacity="0.3"
        stroke-linecap="round"/>
</svg>
